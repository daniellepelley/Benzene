services:
  rabbitmq:
    # Pinned, not :latest, for reproducible CI. 4.0 is the current stable line and ships the v7
    # async-API-compatible broker. Non-default credentials are set below on purpose: RabbitMQ's
    # built-in "guest" user is restricted to loopback connections *inside the container*, so a
    # host->mapped-port login as guest is refused - any non-guest user is not loopback-restricted,
    # so the test connects as "benzene" instead.
    image: rabbitmq:4.0
    environment:
      - RABBITMQ_DEFAULT_USER=benzene
      - RABBITMQ_DEFAULT_PASS=benzene
    ports:
      # Remapped from the broker's default (5672) so this can run alongside the Event Hubs
      # emulator (eventhub-docker-compose.yaml), which claims that same host port - both fixtures
      # are ICollectionFixtures in the same DockerEmulatorCollection, so both compose stacks are up
      # concurrently for the whole test collection. The RabbitMQ client connects on any port
      # explicitly (see RabbitMqWorkerLiveTest.Port), so remapping the host side is transparent to
      # the broker/client protocol.
      - 5674:5672
