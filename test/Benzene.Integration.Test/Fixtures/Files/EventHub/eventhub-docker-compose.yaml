services:
  emulator:
    image: mcr.microsoft.com/azure-messaging/eventhubs-emulator:latest
    volumes:
      - ./eventhub-emulator-config.json:/Eventhubs_Emulator/ConfigFiles/Config.json
    ports:
      - 5672:5672
      - 9092:9092
      - 5300:5300
    environment:
      - BLOB_SERVER=azurite
      - METADATA_SERVER=azurite
      - ACCEPT_EULA=Y
    depends_on:
      - azurite
    networks:
      eh-emulator:
        aliases:
          - eventhubs-emulator
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    ports:
      # Blob endpoint exposed to the host for BenzeneEventHubWorkerLiveTest's
      # EventProcessorClient checkpoint store ("UseDevelopmentStorage=true" -> 127.0.0.1:10000).
      - 10000:10000
    networks:
      eh-emulator:
        aliases:
          - azurite
networks:
  eh-emulator:
