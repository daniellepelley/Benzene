# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: Deploy Benzene

on:
  workflow_dispatch:
    inputs:
      channel:
        description: >-
          Release channel. "stable" publishes the exact version.txt value (e.g. 1.0.0).
          Any prerelease channel appends an auto-incremented counter to produce a
          SemVer-2 prerelease (e.g. 1.0.0-rc.1), per VERSIONING.md.
        type: choice
        required: true
        default: alpha
        options:
          - alpha
          - beta
          - rc
          - preview
          - stable
jobs:
  deploy:

    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    - name: Determine version
      id: version
      env:
        CHANNEL: ${{ inputs.channel }}
      run: |
        set -euo pipefail
        # version.txt is the numeric base only (MAJOR.MINOR.PATCH); the channel decides the suffix.
        BASE_VERSION="$(tr -d '[:space:]' < version.txt)"
        PACKAGE_ID="benzene.core"

        if [ "$CHANNEL" = "stable" ]; then
          # A stable release is cut deliberately from version.txt with no counter.
          FULL_VERSION="${BASE_VERSION}"
        else
          # Prerelease: find the highest existing counter for this base+channel on nuget and
          # increment it, producing a SemVer-2 dotted prerelease (e.g. 1.0.0-rc.3).
          HTTP_STATUS=$(curl -s -o /tmp/nuget-versions.json -w '%{http_code}' \
            "https://api.nuget.org/v3-flatcontainer/${PACKAGE_ID}/index.json")

          LAST_BUILD=0
          if [ "$HTTP_STATUS" = "200" ]; then
            ESCAPED="$(printf '%s' "${BASE_VERSION}-${CHANNEL}" | sed 's/[.-]/\\&/g')"
            while IFS= read -r BUILD; do
              if [ "$BUILD" -gt "$LAST_BUILD" ]; then
                LAST_BUILD="$BUILD"
              fi
            done < <(jq -r '.versions[]' /tmp/nuget-versions.json \
              | grep -E "^${ESCAPED}\.[0-9]+$" \
              | sed -E "s/^${ESCAPED}\.([0-9]+)$/\1/")
          fi

          FULL_VERSION="${BASE_VERSION}-${CHANNEL}.$((LAST_BUILD + 1))"
        fi

        echo "Resolved version: ${FULL_VERSION}"
        echo "full_version=${FULL_VERSION}" >> "$GITHUB_OUTPUT"
    - name: Restore dependencies
      run: dotnet restore Benzene.sln
    - name: Build
      run: dotnet build Benzene.sln --no-restore
    - name: Pack
      run: dotnet pack Benzene.sln -c Release -p:PackageVersion=${{ steps.version.outputs.full_version }}
    - name: NuGet login
      if: startsWith(github.ref, 'refs/heads/main')
      id: nuget-login
      uses: NuGet/login@v1
      with:
        user: ${{ secrets.NUGET_USER }}
    - name: Publish
      if: startsWith(github.ref, 'refs/heads/main')
      run: dotnet nuget push **/*.nupkg --source 'https://api.nuget.org/v3/index.json' --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
