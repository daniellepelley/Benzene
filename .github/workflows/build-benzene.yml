# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: Build Benzene 

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 10.0.x
    - name: Restore dependencies
      run: dotnet restore Benzene.sln
    - name: Build
      run: dotnet build Benzene.sln --no-restore
    - name: Test
      run: dotnet test test/Benzene.Core.Test/Benzene.Test.csproj --no-build --verbosity normal --collect:"XPlat Code Coverage" --results-directory ./coverage
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        directory: ./coverage
        token: ${{ secrets.CODECOV_TOKEN }}
        fail_ci_if_error: false
    - name: Test (Grpc)
      run: dotnet test test/Benzene.Grpc.Test/Benzene.Grpc.Test.csproj --no-build --verbosity normal
    - name: Test (Mesh)
      run: dotnet test test/Benzene.Mesh.Test/Benzene.Mesh.Test.csproj --no-build --verbosity normal
    - name: Test (Conformance)
      run: dotnet test test/Benzene.Conformance.Test/Benzene.Conformance.Test.csproj --no-build --verbosity normal

  aws-integration-tests:

    runs-on: ubuntu-latest
    needs: build

    steps:
    - uses: actions/checkout@v3
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 10.0.x
    - name: Ensure docker-compose CLI is resolvable (FluentDocker looks for this binary name; ubuntu-latest only ships the "docker compose" v2 plugin)
      run: |
        if ! command -v docker-compose >/dev/null 2>&1; then
          printf '#!/usr/bin/env bash\nexec docker compose "$@"\n' | sudo tee /usr/local/bin/docker-compose > /dev/null
          sudo chmod +x /usr/local/bin/docker-compose
        fi
        docker-compose version
    - name: Restore dependencies
      run: dotnet restore Benzene.sln
    - name: Build
      run: dotnet build test/Benzene.Aws.Tests/Benzene.Aws.Tests.csproj --no-restore
    - name: Test
      run: dotnet test test/Benzene.Aws.Tests/Benzene.Aws.Tests.csproj --no-build --verbosity normal

  # Compile gate for the Azure examples - they are not part of Benzene.sln, so without this job
  # an Azure library change could break them without CI noticing (docs snippets and the example
  # drifting from the real API is exactly the failure mode this guards). Build-only: deploying
  # them needs an Azure subscription this repo doesn't have wired up.
  azure-example-build:

    runs-on: ubuntu-latest
    needs: build

    steps:
    - uses: actions/checkout@v3
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 10.0.x
    - name: Build Azure Functions example
      run: dotnet build examples/Azure/Benzene.Example.Azure.sln
    - name: Build Azure worker example
      run: dotnet build examples/Azure/Benzene.Example.Azure.Worker/Benzene.Example.Azure.Worker.csproj

  azure-integration-tests:

    runs-on: ubuntu-latest
    needs: build

    steps:
    - uses: actions/checkout@v3
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 10.0.x
    - name: Ensure docker-compose CLI is resolvable (FluentDocker looks for this binary name; ubuntu-latest only ships the "docker compose" v2 plugin)
      run: |
        if ! command -v docker-compose >/dev/null 2>&1; then
          printf '#!/usr/bin/env bash\nexec docker compose "$@"\n' | sudo tee /usr/local/bin/docker-compose > /dev/null
          sudo chmod +x /usr/local/bin/docker-compose
        fi
        docker-compose version
    - name: Restore dependencies
      run: dotnet restore Benzene.sln
    - name: Build
      run: dotnet build test/Benzene.Integration.Test/Benzene.Integration.Test.csproj --no-restore
    - name: Test
      run: dotnet test test/Benzene.Integration.Test/Benzene.Integration.Test.csproj --no-build --verbosity normal
