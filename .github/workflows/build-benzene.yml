# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: Build Benzene 

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 10.0.x
    - name: Restore dependencies
      run: dotnet restore Benzene.sln
    - name: Build
      run: dotnet build Benzene.sln --no-restore
    - name: Test
      run: dotnet test test/Benzene.Core.Test/Benzene.Test.csproj --no-build --verbosity normal --collect:"XPlat Code Coverage" --results-directory ./coverage
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        directory: ./coverage
        token: ${{ secrets.CODECOV_TOKEN }}
        fail_ci_if_error: false

  aws-integration-tests:

    runs-on: ubuntu-latest
    needs: build

    steps:
    - uses: actions/checkout@v3
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 10.0.x
    - name: Restore dependencies
      run: dotnet restore Benzene.sln
    - name: Build
      run: dotnet build test/Benzene.Aws.Tests/Benzene.Aws.Tests.csproj --no-restore
    - name: Test
      run: dotnet test test/Benzene.Aws.Tests/Benzene.Aws.Tests.csproj --no-build --verbosity normal
