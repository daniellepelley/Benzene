# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: Build Benzene 

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 10.0.x
    - name: Restore dependencies
      run: dotnet restore Benzene.sln
    - name: Build
      run: dotnet build Benzene.sln --no-restore
    - name: Test
      run: dotnet test test/Benzene.Core.Test/Benzene.Test.csproj --no-build --verbosity normal --collect:"XPlat Code Coverage" --results-directory ./coverage
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        directory: ./coverage
        token: ${{ secrets.CODECOV_TOKEN }}
        fail_ci_if_error: false
    - name: Test (Grpc)
      run: dotnet test test/Benzene.Grpc.Test/Benzene.Grpc.Test.csproj --no-build --verbosity normal
    - name: Test (Mesh)
      run: dotnet test test/Benzene.Mesh.Test/Benzene.Mesh.Test.csproj --no-build --verbosity normal
    - name: Test (Conformance)
      run: dotnet test test/Benzene.Conformance.Test/Benzene.Conformance.Test.csproj --no-build --verbosity normal

  aws-integration-tests:

    runs-on: ubuntu-latest
    needs: build

    steps:
    - uses: actions/checkout@v3
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 10.0.x
    - name: Ensure docker-compose CLI is resolvable (FluentDocker looks for this binary name; ubuntu-latest only ships the "docker compose" v2 plugin)
      run: |
        if ! command -v docker-compose >/dev/null 2>&1; then
          printf '#!/usr/bin/env bash\nexec docker compose "$@"\n' | sudo tee /usr/local/bin/docker-compose > /dev/null
          sudo chmod +x /usr/local/bin/docker-compose
        fi
        docker-compose version
    - name: Restore dependencies
      run: dotnet restore Benzene.sln
    - name: Build
      run: dotnet build test/Benzene.Aws.Tests/Benzene.Aws.Tests.csproj --no-restore
    - name: Test
      run: dotnet test test/Benzene.Aws.Tests/Benzene.Aws.Tests.csproj --no-build --verbosity normal

  # Compile gate for ALL examples - they are not part of Benzene.sln, so without this job a
  # library change could break the copy-paste example surface (AWS, Asp, Azure, ...) without CI
  # noticing. Since Benzene's whole pitch is "copy an example, change one thing", a silently
  # broken example is a first-15-minutes adoption failure. Build-only: actually deploying the
  # cloud examples needs credentials this repo doesn't wire up.
  examples-build:

    runs-on: ubuntu-latest
    needs: build

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    # Benzene.Examples.sln covers every example (AWS, Asp, Azure Functions + Worker, Grpc, Kafka,
    # Saga, Mesh, CodeGen, and the out-of-1.0-scope Google/Cloudflare, which still must compile).
    - name: Build all examples
      run: dotnet build Benzene.Examples.sln
    # Run the in-memory example test projects (Benzene.Testing / BuildAwsLambdaHost /
    # BuildAzureFunctionApp / WebApplicationFactory) - no external dependency, safe on a plain runner.
    # This turns the examples from compile-only into a real regression gate: a src/ change that breaks
    # an example's behaviour now fails the build. Listed explicitly rather than `dotnet test <sln>`
    # because Benzene.Examples.Kafka.Test, despite its name, connects to a real Kafka broker (it's
    # effectively a .Dev.Test) and can't run here; the true real-dependency tiers live in *.Dev.Test
    # projects kept out of the solution entirely.
    - name: Test in-memory examples
      run: |
        dotnet test examples/App/Benzene.Examples.App.Test/Benzene.Examples.App.Test.csproj --no-build --verbosity normal
        dotnet test examples/Asp/Benzene.Example.Asp.Test/Benzene.Example.Asp.Test.csproj --no-build --verbosity normal
        dotnet test examples/Aws/Benzene.Examples.Aws.Tests/Benzene.Examples.Aws.Tests.csproj --no-build --verbosity normal
        dotnet test examples/Azure/Benzene.Example.Azure.Test/Benzene.Example.Azure.Test.csproj --no-build --verbosity normal
        dotnet test examples/Grpc/Benzene.Example.Grpc.Test/Benzene.Example.Grpc.Test.csproj --no-build --verbosity normal
        dotnet test examples/OpenTelemetry/Benzene.Examples.OpenTelemetry.Test/Benzene.Examples.OpenTelemetry.Test.csproj --no-build --verbosity normal
        dotnet test examples/Saga/Benzene.Example.Saga.Tests/Benzene.Example.Saga.Tests.csproj --no-build --verbosity normal
        dotnet test examples/Google/Benzene.Examples.Google.Tests/Benzene.Examples.Google.Tests.csproj --no-build --verbosity normal

  azure-integration-tests:

    runs-on: ubuntu-latest
    needs: build

    steps:
    - uses: actions/checkout@v3
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 10.0.x
    - name: Ensure docker-compose CLI is resolvable (FluentDocker looks for this binary name; ubuntu-latest only ships the "docker compose" v2 plugin)
      run: |
        if ! command -v docker-compose >/dev/null 2>&1; then
          printf '#!/usr/bin/env bash\nexec docker compose "$@"\n' | sudo tee /usr/local/bin/docker-compose > /dev/null
          sudo chmod +x /usr/local/bin/docker-compose
        fi
        docker-compose version
    - name: Restore dependencies
      run: dotnet restore Benzene.sln
    - name: Build
      run: dotnet build test/Benzene.Integration.Test/Benzene.Integration.Test.csproj --no-restore
    - name: Test
      run: dotnet test test/Benzene.Integration.Test/Benzene.Integration.Test.csproj --no-build --verbosity normal
