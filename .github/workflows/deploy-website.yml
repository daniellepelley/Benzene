name: Deploy Website (dev)

# Builds the static site and publishes it to the DEV bucket (dev.benzene.app) on every push to main
# that touches the site sources, then invalidates the dev CloudFront distribution. Promotion to
# production (benzene.app) is a separate, manual step — see promote-website.yml.
on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'README.md'
      - 'website/**'
      - '.github/workflows/deploy-website.yml'
  workflow_dispatch:

jobs:
  deploy-dev:
    environment: test
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ vars.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ${{ vars.WEBSITE_AWS_REGION }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Generate site
      run: dotnet run --project website/generator -- --out website/dist

    - name: Sync to the dev bucket
      run: aws s3 sync website/dist "s3://${{ vars.WEBSITE_DEV_BUCKET }}" --delete

    - name: Invalidate the dev CloudFront distribution
      run: |
        aws cloudfront create-invalidation \
          --distribution-id "${{ vars.WEBSITE_DEV_DISTRIBUTION_ID }}" \
          --paths "/*"

    - name: Summary
      run: echo "Deployed to https://dev.benzene.app — promote with the 'Promote Website (dev -> live)' workflow." >> "$GITHUB_STEP_SUMMARY"
