name: Deploy Website

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'README.md'
      - 'website/**'
      - '.github/workflows/deploy-website.yml'
  workflow_dispatch:

jobs:
  deploy:
    environment: test
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ vars.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ${{ vars.WEBSITE_AWS_REGION }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Generate site
      run: dotnet run --project website/generator -- --out website/dist

    - name: Sync to S3
      run: aws s3 sync website/dist "s3://${{ vars.WEBSITE_S3_BUCKET }}" --delete
