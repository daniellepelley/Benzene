# Verifies the Benzene.Templates dotnet-new template pack: packs it, installs the freshly-built
# package (not the published NuGet version - this catches template-authoring breakage before a
# release), generates a project from every template, and builds each generated output. Also runs
# on a daily schedule so a floating Version="*-*" Benzene package release can't silently break a
# template with zero changes to this repo going unnoticed - see templates/README.md.

name: Build Templates

on:
  push:
    branches: [ "main" ]
    paths:
      - 'templates/**'
      - '.github/workflows/build-templates.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'templates/**'
      - '.github/workflows/build-templates.yml'
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  build-templates:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 10.0.x

    - name: Check shared HelloWorldMessageHandler.cs hasn't drifted
      run: |
        set -euo pipefail
        # Group A - the request/response handler shared by every HTTP-shaped and Lambda template
        # (the [HttpEndpoint] is harmless on the non-HTTP ones; the same handler serving them all is
        # the point). Group B - the fire-and-forget handler shared by the queue/topic/event workers.
        # kafka-worker (literal-topic routing) and azure-eventgrid (event-type routing) are
        # deliberately their own shape - not part of either group.
        # Group A (request/response, canonical asp) - HTTP-shaped templates that assert on the response.
        canonical_a="templates/content/asp/HelloWorldMessageHandler.cs"
        for dir in aws-apigateway azure-http selfhost-http; do
          if ! diff -u "$canonical_a" "templates/content/$dir/HelloWorldMessageHandler.cs"; then
            echo "::error::templates/content/$dir/HelloWorldMessageHandler.cs has drifted from $canonical_a"
            exit 1
          fi
        done
        # Group C (fire-and-forget with an injected collaborator, canonical aws-sqs) - the component-test
        # templates that need a spyable dependency to assert the handler ran.
        canonical_c="templates/content/aws-sqs/HelloWorldMessageHandler.cs"
        for dir in aws-sns azure-eventhub; do
          if ! diff -u "$canonical_c" "templates/content/$dir/HelloWorldMessageHandler.cs"; then
            echo "::error::templates/content/$dir/HelloWorldMessageHandler.cs has drifted from $canonical_c"
            exit 1
          fi
        done
        # Group B (fire-and-forget, no collaborator - still on the in-memory test, canonical rabbitmq).
        canonical_b="templates/content/rabbitmq-worker/HelloWorldMessageHandler.cs"
        for dir in servicebus-worker azure-servicebus azure-queuestorage; do
          if ! diff -u "$canonical_b" "templates/content/$dir/HelloWorldMessageHandler.cs"; then
            echo "::error::templates/content/$dir/HelloWorldMessageHandler.cs has drifted from $canonical_b"
            exit 1
          fi
        done

    - name: Check shared BenzeneStarter.Tests files haven't drifted
      run: |
        set -euo pipefail
        # The optional unit-test project shares the same way the handler does: the .csproj is identical
        # everywhere; the test .cs shares by handler group (A asserts Ok + body, B asserts Accepted),
        # with kafka-worker/azure-eventgrid differing only in the topic string.
        # Only templates still on the shared in-memory test keep the identical .csproj + shared test .cs.
        # Component-test templates (bespoke per transport) are dropped from these lists as they migrate.
        canonical_csproj="templates/content/asp/BenzeneStarter.Tests/BenzeneStarter.Tests.csproj"
        for dir in selfhost-http azure-servicebus azure-eventgrid azure-queuestorage kafka-worker rabbitmq-worker servicebus-worker; do
          if ! diff -u "$canonical_csproj" "templates/content/$dir/BenzeneStarter.Tests/BenzeneStarter.Tests.csproj"; then
            echo "::error::templates/content/$dir/BenzeneStarter.Tests/BenzeneStarter.Tests.csproj has drifted from $canonical_csproj"
            exit 1
          fi
        done
        canonical_test_a="templates/content/asp/BenzeneStarter.Tests/HelloWorldMessageHandlerTests.cs"
        for dir in selfhost-http; do
          if ! diff -u "$canonical_test_a" "templates/content/$dir/BenzeneStarter.Tests/HelloWorldMessageHandlerTests.cs"; then
            echo "::error::templates/content/$dir/BenzeneStarter.Tests/HelloWorldMessageHandlerTests.cs has drifted from $canonical_test_a"
            exit 1
          fi
        done
        canonical_test_b="templates/content/rabbitmq-worker/BenzeneStarter.Tests/HelloWorldMessageHandlerTests.cs"
        for dir in servicebus-worker azure-servicebus azure-queuestorage; do
          if ! diff -u "$canonical_test_b" "templates/content/$dir/BenzeneStarter.Tests/HelloWorldMessageHandlerTests.cs"; then
            echo "::error::templates/content/$dir/BenzeneStarter.Tests/HelloWorldMessageHandlerTests.cs has drifted from $canonical_test_b"
            exit 1
          fi
        done

    - name: Pack Benzene.Templates
      run: dotnet pack templates/Benzene.Templates.csproj -c Release -o ./templates-pack

    - name: Install the freshly-packed template pack
      run: dotnet new install ./templates-pack/Benzene.Templates.*.nupkg

    - name: Generate, build and test every template
      run: |
        set -euo pipefail
        for shortname in \
          benzene.asp benzene.aws.apigateway benzene.aws.sqs benzene.aws.sns \
          benzene.azure.http benzene.kafka.worker \
          benzene.selfhost.http benzene.rabbitmq.worker benzene.servicebus.worker \
          benzene.azure.servicebus benzene.azure.eventhub benzene.azure.eventgrid benzene.azure.queuestorage; do
          out="/tmp/generated/${shortname}"
          log="/tmp/${shortname}.buildlog"
          echo "::group::${shortname}"
          # Default generation includes the unit-test project. `dotnet test` on it compiles both the
          # test project AND the main project it references, then runs the starter tests - so this one
          # command verifies the whole generated output (main + tests) end to end.
          dotnet new "$shortname" -n Sample -o "$out"
          if dotnet test "$out/Sample.Tests/Sample.Tests.csproj" --verbosity minimal > "$log" 2>&1; then
            cat "$log"
          else
            cat "$log"
            # A Benzene package that is in Benzene.sln and packable but hasn't reached NuGet yet (it
            # ships on the next `deploy-benzene.yml` release) fails restore with NU1101. That's a
            # publish-cadence gap, not a template break: the project generated fine, so warn and move
            # on - this step self-heals the moment the package is published. Any OTHER build failure
            # is a genuine template break and fails the run.
            if grep -qE "error NU1101: Unable to find package Benzene\." "$log"; then
              echo "::warning::${shortname}: a required Benzene package isn't on NuGet yet (in Benzene.sln + packable, ships next release). Generated OK; build skipped until then."
            else
              echo "::error::${shortname} failed to build or test"
              exit 1
            fi
          fi
          echo "::endgroup::"
        done

    - name: Uninstall the template pack
      if: always()
      run: dotnet new uninstall Benzene.Templates || true
