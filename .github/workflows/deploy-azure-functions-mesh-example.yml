name: Deploy Azure Functions Mesh Example

# Manual-only: deploys examples/AzureFunctionsMesh (3 Cloud Service Function Apps + the mesh Function
# App) to Azure via Terraform, then publishes the built code to each app with the Functions Core Tools.
# Needs an Azure service principal in the "test" GitHub Environment: AZURE_CREDENTIALS (azure/login
# JSON) with rights to create the resource group, storage, App Service plan, Function Apps, and to
# assign roles (Owner or User Access Administrator on the subscription/RG). Nothing here runs on push.
on:
  workflow_dispatch:
    inputs:
      location:
        description: "Azure region"
        required: true
        default: "westeurope"
      storage_account:
        description: "Storage account for the Functions runtime + mesh catalog (globally unique, lowercase alphanumeric, <=24 chars). The remote state uses <name>tfstate, so this MUST differ from other examples' value (e.g. the AzureMesh example's 'benzenemesh')."
        required: true
        default: "benzenefnmesh"

permissions:
  contents: read

env:
  RG: benzene-fnmesh-rg
  PROJECT: benzene-fnmesh

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Terraform's provider is set to resource_provider_registrations = "none", so register the
      # handful of resource providers this stack needs up front (idempotent; safe to re-run).
      - name: Register required Azure resource providers
        run: |
          for rp in Microsoft.Storage Microsoft.Web Microsoft.ManagedIdentity; do
            az provider register --namespace "$rp"
          done

      - uses: hashicorp/setup-terraform@v3

      # Remote state in a per-subscription storage account, created on first use (idempotent). The RG is
      # created here to hold the state storage account; Terraform reads it as a data source.
      - name: Terraform init (remote azurerm state)
        working-directory: examples/AzureFunctionsMesh/deploy
        env:
          LOCATION: ${{ inputs.location }}
          STATE_SA: ${{ inputs.storage_account }}tfstate
        run: |
          az group create -n "$RG" -l "$LOCATION" >/dev/null

          # The state storage account name is GLOBALLY unique, so a create can legitimately fail
          # because the name is already taken - most commonly by the sibling AzureMesh example when
          # both are run with the same `storage_account` (each derives <name>tfstate). Do NOT let that
          # be swallowed: after the create attempt, require the account to exist in THIS resource
          # group, otherwise fail here with an actionable message rather than letting `terraform init`
          # surface it downstream as an opaque 404 ResourceNotFound.
          az storage account create -n "$STATE_SA" -g "$RG" -l "$LOCATION" --sku Standard_LRS >/dev/null 2>&1 || true
          if ! az storage account show -g "$RG" -n "$STATE_SA" >/dev/null 2>&1; then
            echo "::error::Remote-state storage account '$STATE_SA' is not available in resource group '$RG'."
            echo "::error::Storage-account names are globally unique - '$STATE_SA' is most likely already taken elsewhere"
            echo "::error::(e.g. by the AzureMesh example, which also derives <storage_account>tfstate from its input)."
            echo "::error::Re-run this workflow with a different, globally-unique 'storage_account' value."
            exit 1
          fi
          az storage container create -n tfstate --account-name "$STATE_SA" --auth-mode login >/dev/null 2>&1 || true
          terraform init -input=false \
            -backend-config="resource_group_name=$RG" \
            -backend-config="storage_account_name=$STATE_SA" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=azure-functions-mesh.tfstate"

      # Create the storage, plan, the four Function Apps, the mesh identity, and its role assignments.
      # Remote state (above) makes re-runs after a partial failure resume cleanly.
      - name: Terraform apply
        working-directory: examples/AzureFunctionsMesh/deploy
        run: |
          terraform apply -input=false -auto-approve \
            -var "location=${{ inputs.location }}" \
            -var "project=$PROJECT" \
            -var "resource_group=$RG" \
            -var "storage_account=${{ inputs.storage_account }}"

      # Publish the built code to each Function App. The apps are published SELF-CONTAINED (they
      # carry their own .NET runtime), because classic Linux Consumption (Y1) does not offer the
      # newest .NET stacks - the host only has to start the worker executable, so the Terraform
      # stack pin (var.dotnet_version) stays on a version the plan supports while the apps run
      # .NET 10. Deployment is a plain zip deploy via az (no Functions Core Tools needed), followed
      # by the ARM sync-triggers call - retried with backoff since on Linux Consumption it can
      # return transient errors before freshly deployed content is consistent, and its error BODY
      # is printed on every failed attempt (it names the real cause; never swallow it). The three
      # services share one deployable - MESH_SERVICE (set per app by Terraform) selects the domain.
      - name: Publish Function App code (self-contained, resilient sync-triggers)
        working-directory: examples/AzureFunctionsMesh
        run: |
          set -uo pipefail
          SUB="$(az account show --query id -o tsv)"

          echo "::group::dotnet publish (self-contained linux-x64)"
          dotnet publish Service -c Release -r linux-x64 --self-contained true -o publish/service
          dotnet publish Mesh    -c Release -r linux-x64 --self-contained true -o publish/mesh
          (cd publish/service && zip -qr ../service.zip .)
          (cd publish/mesh    && zip -qr ../mesh.zip .)
          echo "::endgroup::"

          # Force the isolated worker to cold-start before asking ARM to enumerate triggers. On a
          # fresh Linux Consumption (Y1) deploy, syncfunctiontriggers returns "Forbidden from
          # extensions API" NOT because of anything in the package (the same service.zip that fails
          # here on one app succeeds on its identical siblings) but because the host hasn't started
          # the worker yet, so it can't reach the app's extensions endpoint to read the (correctly
          # generated) functions.metadata. A single anonymous HTTP hit - ANY response, even a 404,
          # proves the worker is up - pushes the host into that ready state so the sync succeeds.
          # See README 'Known first-deploy iteration points'.
          warm() {
            curl -sS -o /dev/null --max-time 120 "https://${1}.azurewebsites.net/" 2>/dev/null || true
          }

          # Warm, then retry the ARM sync-triggers endpoint with capped backoff; returns 0 as soon as
          # one call succeeds. Prints each failed attempt's response body - that's the actual diagnosis.
          sync_triggers() {
            local app="$1" out
            local url="https://management.azure.com/subscriptions/$SUB/resourceGroups/$RG/providers/Microsoft.Web/sites/$app/syncfunctiontriggers?api-version=2023-12-01"
            for attempt in 1 2 3 4 5 6 7 8; do
              warm "$app"
              if out="$(az rest --method post --url "$url" 2>&1)"; then
                echo "sync-triggers OK for $app (attempt $attempt)"
                return 0
              fi
              echo "sync-triggers for $app failed (attempt $attempt): ${out:0:600}"
              sleep $(( attempt < 4 ? attempt * 15 : 60 ))
            done
            return 1
          }

          deploy() {
            local app="$1" zipfile="$2"
            echo "::group::zip deploy $app"
            local ok=0
            az functionapp deployment source config-zip -g "$RG" -n "$app" --src "$zipfile" --timeout 600 || ok=1
            echo "::endgroup::"
            if [ "$ok" -ne 0 ]; then
              echo "zip deploy reported a failure for $app (the package usually uploaded; the trailing trigger sync is the fragile part). Verifying via ARM sync-triggers..."
            fi
            if sync_triggers "$app"; then
              return 0
            fi
            echo "::error::Publishing $app failed: sync-triggers kept erroring after retries (error bodies above)."
            echo "::error::The Functions host could not enumerate the app's triggers - most often the isolated"
            echo "::error::worker can't start. See examples/AzureFunctionsMesh/README.md 'Known first-deploy"
            echo "::error::iteration points'. Diagnostics for $app:"
            az functionapp show -g "$RG" -n "$app" --query "{state:state,lastModified:lastModifiedTimeUtc}" -o json || true
            az functionapp config show -g "$RG" -n "$app" --query "linuxFxVersion" -o tsv || true
            return 1
          }

          rc=0
          for svc in orders payments shipping; do
            deploy "${PROJECT}-${svc}" publish/service.zip || rc=1
          done
          deploy "${PROJECT}-mesh" publish/mesh.zip || rc=1
          exit "$rc"

      - name: Show URLs
        working-directory: examples/AzureFunctionsMesh/deploy
        run: terraform output
