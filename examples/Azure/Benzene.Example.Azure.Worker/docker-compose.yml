# Local Azure emulators for running this example end to end:
#   - Azure Service Bus emulator (+ its required SQL Server backend)
#   - Azure Event Hubs emulator (+ Azurite for the blob checkpoint store)
#
# The Service Bus emulator is remapped to 5673/5301 (from its 5672/5300 defaults) so it can run
# alongside the Event Hubs emulator, which uses those defaults - the same port layout the repo's
# integration tests use. The connection strings in config.json already point at these ports.
#
#   docker compose up -d
#   dotnet run
services:
  servicebus-emulator:
    image: mcr.microsoft.com/azure-messaging/servicebus-emulator:latest
    volumes:
      - ./servicebus-emulator-config.json:/ServiceBus_Emulator/ConfigFiles/Config.json
    ports:
      - "5673:5672"
      - "5301:5300"
    environment:
      SQL_SERVER: mssql
      MSSQL_SA_PASSWORD: Benzene_Example_Pwd1!
      ACCEPT_EULA: "Y"
    depends_on:
      - mssql
    networks:
      azure-emulators:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: Benzene_Example_Pwd1!
    networks:
      azure-emulators:
  eventhubs-emulator:
    image: mcr.microsoft.com/azure-messaging/eventhubs-emulator:latest
    volumes:
      - ./eventhub-emulator-config.json:/Eventhubs_Emulator/ConfigFiles/Config.json
    ports:
      - "5672:5672"
      - "5300:5300"
    environment:
      BLOB_SERVER: azurite
      METADATA_SERVER: azurite
      ACCEPT_EULA: "Y"
    depends_on:
      - azurite
    networks:
      azure-emulators:
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    ports:
      - "10000:10000"
    networks:
      azure-emulators:
networks:
  azure-emulators:
