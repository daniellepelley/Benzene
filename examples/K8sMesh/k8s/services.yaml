# The three Cloud Services: one image (benzene-k8smesh-service) deployed three times, each selecting
# its domain via MESH_SERVICE. Each Kubernetes Service carries the `benzene: "true"` label so the mesh
# discovers it; the mesh's own Service (mesh.yaml) deliberately does not.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders
  namespace: benzene-mesh
spec:
  replicas: 1
  selector:
    matchLabels: { app: orders }
  template:
    metadata:
      labels: { app: orders }
    spec:
      containers:
        - name: orders
          image: benzene-k8smesh-service:local
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 8080 }]
          env:
            - { name: MESH_SERVICE, value: orders }
            # Report to the mesh pod's collector (register/heartbeat/traces) so the live Fleet view
            # populates. In-cluster the mesh Service is reachable by name in this namespace.
            - { name: MESH_COLLECTOR_ENVELOPE_URL, value: http://mesh/benzene/invoke }
          readinessProbe:
            httpGet: { path: /benzene/health, port: 8080 }
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: orders
  namespace: benzene-mesh
  labels: { benzene: "true" }
spec:
  selector: { app: orders }
  ports: [{ port: 80, targetPort: 8080 }]
---
