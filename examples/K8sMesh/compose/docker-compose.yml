name: benzene-mesh

# A cloud-free, one-command Benzene service-mesh demo. Three real Benzene Cloud Services
# (orders / payments / shipping — the K8sMesh Service image, one image, MESH_SERVICE selects the
# domain) are discovered over plain HTTP and aggregated by the config-driven mesh host
# (deploy/Mesh/Benzene.Mesh.Host), which serves the Mesh UI at http://localhost:8090/mesh-ui.
#
#   docker compose -f examples/K8sMesh/compose/docker-compose.yml up --build
#
# Both images build from mcr.microsoft.com/dotnet base images; the build context is the repo root
# because the projects reference src/ directly. See README.md.

services:
  orders:
    build:
      context: ../../..
      dockerfile: examples/K8sMesh/Service/Dockerfile
    image: benzene-mesh-service:compose
    environment:
      - MESH_SERVICE=orders
      # Chain the next hop: orders → payments over the BenzeneMessage envelope endpoint. Here services
      # address each other's container directly, so the port is :8080 (in k8s it's the Service's :80).
      - DOWNSTREAM_MSG_URL=http://payments:8080/benzene-message
    depends_on: [payments]

  payments:
    image: benzene-mesh-service:compose
    environment:
      - MESH_SERVICE=payments
      - DOWNSTREAM_MSG_URL=http://shipping:8080/benzene-message
    depends_on: [shipping]

  shipping:
    image: benzene-mesh-service:compose
    environment:
      - MESH_SERVICE=shipping

  mesh:
    build:
      context: ../../..
      dockerfile: deploy/Mesh/Benzene.Mesh.Host/Dockerfile
    image: benzene-mesh-host:compose
    ports:
      - "8090:8080"
    environment:
      - MESH_CONFIG_PATH=/config/mesh.json
    volumes:
      - ./mesh.json:/config/mesh.json:ro
    depends_on: [orders, payments, shipping]
